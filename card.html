<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Открытка</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #111 0%, #1b0f18 50%, #2a0f16 100%);
            font-family: Arial, sans-serif;
            color: white;
        }

        .card {
            width: min(90vw, 500px);
            padding: 40px 30px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 40px rgba(255, 49, 95, 0.25);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .card h1 {
            margin: 0 0 20px;
            font-size: 42px;
            color: #ff4d7a;
            text-shadow: 0 0 12px rgba(255, 77, 122, 0.6);
        }

        .card p {
            font-size: 22px;
            line-height: 1.6;
            margin: 0;
        }

        .back-btn {
            display: inline-block;
            margin-top: 28px;
            padding: 12px 22px;
            border-radius: 999px;
            background: #ff315f;
            color: white;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Открытка</h1>
        <p>Надя, я тебя люблю.<br>Ты очень дорога мне.</p>
        <a class="back-btn" href="index.html">Назад</a>
    </div>
</body>
</html>
